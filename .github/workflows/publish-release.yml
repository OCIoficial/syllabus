name: Publish Release

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year for the release (e.g. 2025)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release year
        id: year
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "value=${{ github.event.inputs.year }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date +'%Y')" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: oci-syllabus.tex

      - name: Create release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.year.outputs.value }}
          name: v${{ steps.year.outputs.value }}
          body: Syllabus para la Olimpiada Chilena de Informática ${{ steps.year.outputs.value }}
          files: oci-syllabus.pdf
